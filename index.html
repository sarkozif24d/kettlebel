<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO meta elemek -->
    <meta name="description" content="Kettlebell edzés otthon">
    <meta name="keywords" content="kettlebell, gym, edzés">

    <!-- CSS fájlok -->
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="premade.min.css">
    <link rel="stylesheet" href="kettlebell.css"> <!-- Saját stílus felülírja a többit -->
    
    <title>Kettlebell otthoni edzés</title>
</head>
<body>
    <!-- Navigáció -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">Kettlebell</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="#ismerteto">Mi is ez?</a></li>
                <li class="nav-item"><a class="nav-link" href="#vasarlas">Vásárlás</a></li>
                <li class="nav-item"><a class="nav-link" href="#generator">Gyakorlatot kérek!</a></li>
            </ul>
        </div>
    </nav>

    <!-- Kedvcsináló szekció -->
    <section id="kedvcsinalo">
        <div class="container text-center">
            <img src="assets/kepek/kep1.jpg" class="img-fluid rounded-circle" alt="Kép 1">
            <img src="assets/kepek/kep2.jpg" class="img-fluid rounded-circle" alt="Kép 2">
            <img src="assets/kepek/kep3.jpg" class="img-fluid rounded-circle" alt="Kép 3">
        </div>
    </section>

    <!-- Mennyibe kerül belevágni? -->
    <section id="arak">
        <div class="container">
            <h2 class="text-center">Mennyibe kerül belevágni?</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Kiloár</h5>
                            <p class="card-price"></p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Edzésterv</h5>
                            <p class="card-price"></p>
                            <ul>
                                <li class="kedvezmeny"></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Tankönyv</h5>
                            <p class="card-price"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- JS fájlok -->
    <script src="jquery-3.3.1.min.js"></script>
    <script src="bootstrap.bundle.min.js"></script>
    <script src="kettlebell.js"></script>
</body>
</html>
